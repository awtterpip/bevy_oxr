[package]
name = "bevy_oxr"
version = "0.1.0"
edition = "2021"
description = "Community crate for OpenXR in Bevy"
repository = "https://github.com/awtterpip/bevy_oxr"
license = "MIT/Apache-2.0"


[features]
default = ["linked", "vulkan"]
linked = ["openxr/linked"]
vulkan = ["wgpu-core/vulkan"]
d3d12 = ["wgpu-core/dx12", "dep:winapi", "dep:d3d12"]

[workspace]
members = ["examples/android", "examples/demo"]

[dependencies]
anyhow = "1.0.75"
ash = "0.37.3"
bevy = "0.12"
futures-lite = "2.0.1"
mint = "0.5.9"
winapi = { version = "0.3.9", optional = true }
wgpu = "0.17.1"
wgpu-core = { version = "0.17.1" }
wgpu-hal = "0.17.1"
wgpu-types = "0.18.0" # until InstanceFlags helpers make it to wgpu
d3d12 = { version = "0.7", features = ["libloading"], optional = true }

[target.'cfg( target_family = "unix" )'.dependencies]
openxr = { version = "0.17.1", features = ["mint"], git = "https://github.com/Ralith/openxrs" }

[target.'cfg(not(target_family = "unix"))'.dependencies]
openxr = { version = "0.17.1", features = ["mint", "static"], git = "https://github.com/Ralith/openxrs" }

[dev-dependencies]
bevy = "0.12"
color-eyre = "0.6.2"
bevy_rapier3d = { git = "https://github.com/devil-ira/bevy_rapier", branch = "bevy-0.12" }

[[example]]
name = "xr"
path = "examples/xr.rs"

[profile.release]
debug = true
